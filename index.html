<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Week 1 and Week 2 Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body { font-family: Arial; margin: 20px; }
  h2, h3 { margin-top: 20px; }
  table { border-collapse: collapse; width: 100%; margin: 15px 0; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #f4f4f4; }
  .summary { margin-top: 20px; background: #eef; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>

<h2>Upload CSV to Compare Weeks</h2>
<input type="file" id="csvFile" accept=".csv" />

<div id="output"></div>
<div id="summary" class="summary"></div>

<script>
document.getElementById('csvFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;

            const metrics = [
                "Average Time",
                "Average Speed",
                "Distance Traveled in 6 Minutes  [Report in Meters]",
                "Average Stride Length Left (cm)",
                "Average Stride Length Right (cm)",
                "Average Velocity (cm/sec)"
            ];

            let week1 = data.slice(0,3); // Pre, Post, Follow-up
            let week2 = data.slice(3,6);

            let html = "";

            // Week 1 Table
            html += "<h3>Week 1</h3>";
            html += createTable(metrics, week1);

            // Week 2 Table
            html += "<h3>Week 2</h3>";
            html += createTable(metrics, week2);

            document.getElementById('output').innerHTML = html;

            // Generate summary
            let summaries = [];
            metrics.forEach(metric => {
                const w1avg = avg(week1.map(r => parseFloat(r[metric]) || NaN));
                const w2avg = avg(week2.map(r => parseFloat(r[metric]) || NaN));
                if (!isNaN(w1avg) && !isNaN(w2avg)) {
                    if (w1avg > w2avg) {
                        summaries.push(`${metric}: Week 1 was higher on average (${w1avg.toFixed(2)} vs ${w2avg.toFixed(2)}).`);
                    } else if (w2avg > w1avg) {
                        summaries.push(`${metric}: Week 2 was higher on average (${w2avg.toFixed(2)} vs ${w1avg.toFixed(2)}).`);
                    } else {
                        summaries.push(`${metric}: Both weeks were about the same (${w1avg.toFixed(2)}).`);
                    }
                }
            });

            document.getElementById('summary').innerHTML = "<h3>Summary</h3><ul><li>" + summaries.join("</li><li>") + "</li></ul>";
        }
    });
});

function createTable(metrics, rows) {
    let html = "<table><tr><th>Metric</th><th>Pre</th><th>Post</th><th>Follow-up</th></tr>";
    metrics.forEach(metric => {
        html += `<tr><td>${metric}</td>`;
        rows.forEach(r => {
            let val = parseFloat(r[metric]);
            html += `<td>${isNaN(val) ? '-' : val.toFixed(2)}</td>`;
        });
        html += "</tr>";
    });
    html += "</table>";
    return html;
}

function avg(arr) {
    const valid = arr.filter(x => !isNaN(x));
    return valid.length ? valid.reduce((a,b) => a+b,0)/valid.length : NaN;
}
</script>

</body>
</html>
